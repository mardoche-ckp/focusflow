<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#f5a623"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FocusFlow"/>
  <meta name="description" content="Gestion d'objectifs personnels"/>

  <title>FocusFlow</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Icône Apple -->
  <link rel="apple-touch-icon" href="icons/icon-192.svg"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ══════════════════════════════════
       SPLASH SCREEN (affiché au lancement)
  ══════════════════════════════════ -->
  <div id="splash" class="splash">
    <div class="splash__inner">
      <span class="splash__logo">◈</span>
      <span class="splash__name">FocusFlow</span>
      <span class="splash__tag">Vos objectifs, votre progression.</span>
    </div>
  </div>

  <!-- ══════════════════════════════════
       TOAST NOTIFICATION
  ══════════════════════════════════ -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- ══════════════════════════════════
       WRAPPER PRINCIPAL (app shell)
  ══════════════════════════════════ -->
  <div class="app-shell">

    <!-- ── TOP BAR ── -->
    <header class="topbar" id="topbar">
      <div class="topbar__left">
        <span class="topbar__logo">◈</span>
        <span class="topbar__title" id="topbarTitle">Accueil</span>
      </div>
      <div class="topbar__right" id="topbarActions">
        <!-- Actions contextuelles injectées par JS -->
      </div>
    </header>

    <!-- ══════════════════════════════════
         VUE 1 — ACCUEIL (dashboard)
    ══════════════════════════════════ -->
    <main class="view active" id="view-home">

      <!-- Bloc stats héro -->
      <section class="home-hero">
        <p class="home-hero__greet" id="greetMsg">Bonjour 👋</p>
        <h1 class="home-hero__headline">Vos <em>objectifs</em><br/>du moment</h1>

        <div class="stats-row">
          <div class="stat-pill">
            <span class="stat-pill__n" id="stat-total">0</span>
            <span class="stat-pill__l">Total</span>
          </div>
          <div class="stat-pill stat-pill--blue">
            <span class="stat-pill__n" id="stat-active">0</span>
            <span class="stat-pill__l">En cours</span>
          </div>
          <div class="stat-pill stat-pill--gold">
            <span class="stat-pill__n" id="stat-done">0</span>
            <span class="stat-pill__l">Terminés</span>
          </div>
        </div>
      </section>

      <!-- Filtres rapides -->
      <div class="chip-filters">
        <button class="chip active" data-filter="all">Tous</button>
        <button class="chip" data-filter="active">En cours</button>
        <button class="chip" data-filter="done">Terminés</button>
      </div>

      <!-- Liste des objectifs -->
      <section class="cards-list" id="objectifsList">
        <!-- Injecté dynamiquement -->
      </section>

      <!-- État vide -->
      <div class="empty-state" id="emptyState" hidden>
        <span class="empty-state__emoji">🎯</span>
        <p class="empty-state__title">Aucun objectif ici</p>
        <p class="empty-state__hint">Appuyez sur + pour en créer un</p>
      </div>

    </main>

    <!-- ══════════════════════════════════
         VUE 2 — DÉTAIL D'UN OBJECTIF
    ══════════════════════════════════ -->
    <main class="view" id="view-detail">
      <!-- Contenu injecté dynamiquement par JS -->
    </main>

    <!-- ══════════════════════════════════
         VUE 3 — STATISTIQUES
    ══════════════════════════════════ -->
    <main class="view" id="view-stats">
      <div class="stats-page">
        <h2 class="stats-page__title">Tableau de bord</h2>

        <div class="stats-big-row">
          <div class="big-stat">
            <span class="big-stat__n" id="bs-total">0</span>
            <span class="big-stat__l">Objectifs créés</span>
          </div>
          <div class="big-stat big-stat--gold">
            <span class="big-stat__n" id="bs-done">0</span>
            <span class="big-stat__l">Terminés</span>
          </div>
        </div>

        <div class="progress-global-wrap">
          <p class="progress-global-label">Taux de complétion global</p>
          <div class="progress-global-bar">
            <div class="progress-global-fill" id="globalFill" style="width:0%"></div>
          </div>
          <p class="progress-global-pct" id="globalPct">0%</p>
        </div>

        <h3 class="stats-section-title">Objectifs récents</h3>
        <div id="recentList" class="recent-list"></div>
      </div>
    </main>

    <!-- ══════════════════════════════════
         BOTTOM NAVIGATION BAR
    ══════════════════════════════════ -->
    <nav class="bottom-nav" role="navigation" aria-label="Navigation principale">
      <button class="nav-item active" data-view="home" aria-label="Accueil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Accueil</span>
      </button>

      <!-- Bouton FAB centré (Ajouter) -->
      <button class="nav-item nav-item--fab" id="fabBtn" aria-label="Créer un objectif">
        <div class="fab-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </button>

      <button class="nav-item" data-view="stats" aria-label="Statistiques">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Stats</span>
      </button>
    </nav>

  </div><!-- /.app-shell -->

  <!-- ══════════════════════════════════
       BOTTOM SHEET — Créer un objectif
  ══════════════════════════════════ -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="bottom-sheet" id="bottomSheet" role="dialog" aria-modal="true" aria-label="Créer un objectif">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Nouvel objectif</h2>

    <div class="sheet-body">
      <div class="field">
        <label class="field__label" for="inputTitre">Titre</label>
        <input type="text" id="inputTitre" class="field__input"
               placeholder="Ex : Apprendre le JavaScript" maxlength="80" autocomplete="off"/>
      </div>
      <div class="field">
        <label class="field__label" for="inputDateFin">Date limite</label>
        <input type="date" id="inputDateFin" class="field__input field__input--date"/>
      </div>
      <button class="btn-primary-full" id="btnCreer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Créer l'objectif
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
